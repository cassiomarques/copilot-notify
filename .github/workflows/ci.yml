name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: swift build

      - name: Run tests
        run: swift test

  build-app:
    runs-on: macos-15
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build release
        run: swift build -c release

      - name: Create app bundle
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Upload app bundle
        uses: actions/upload-artifact@v4
        with:
          name: CopilotNotify.app
          path: dist/CopilotNotify.app
